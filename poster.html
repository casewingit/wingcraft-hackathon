<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wingcraft 해커톤 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --accent: #ff3d00;
      --primary: #fafafa;
      --muted: #6b6b6b;
      --grid: rgba(255, 61, 0, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--primary);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Current Hackathon - Hero */
    .hero {
      background: var(--surface);
      border: 1px solid rgba(255, 61, 0, 0.2);
      padding: 3rem;
      margin-bottom: 3rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(var(--grid) 1px 1px,
        linear-gradient(90deg, var(--grid) 1px 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .round-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }

    .round-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .tag {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4.5rem;
      line-height: 0.9;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .title span {
      display: block;
      color: var(--accent);
      text-shadow: 0 0 60px rgba(255, 61, 0, 0.5);
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin-bottom: 1.5rem;
    }

    .schedule-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .round-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--accent);
      min-width: 40px;
    }

    .round-info {
      font-size: 0.9rem;
    }

    .round-date {
      display: block;
      color: var(--primary);
      margin-bottom: 0.3rem;
    }

    .round-status {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.25rem 0.6rem;
      background: rgba(255, 61, 0, 0.15);
      color: var(--accent);
    }

    .round-status.done {
      background: rgba(255, 61, 0, 0.3);
    }

    .details {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .details-item {
      display: flex;
      gap: 0.5rem;
    }

    .details-item span:first-child {
      color: var(--primary);
    }

    /* History Section */
    .history {
      padding-top: 1rem;
    }

    .history-title {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .history-card {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .history-card:hover {
      border-color: var(--accent);
      background: rgba(255, 61, 0, 0.05);
    }

    .card-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: var(--accent);
      min-width: 60px;
    }

    .card-info {
      flex: 1;
    }

    .card-round {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .card-date {
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 0.3rem;
    }

    .card-status {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      background: rgba(255, 61, 0, 0.2);
      color: var(--accent);
    }

    .card-arrow {
      font-size: 1.5rem;
      color: var(--muted);
      transition: all 0.3s ease;
    }

    .history-card:hover .card-arrow {
      color: var(--accent);
      transform: translateX(5px);
    }

    .glitch {
      position: absolute;
      top: 2rem;
      right: 2rem;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { 
        opacity: 1;
        box-shadow: 0 0 10px var(--accent);
      }
      50% { 
        opacity: 0.5;
        box-shadow: 0 0 30px var(--accent);
      }
    }

    @media (max-width: 640px) {
      body { padding: 1rem; }
      .hero { padding: 1.5rem; }
      .title { font-size: 3rem; }
      .history-card { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .card-arrow { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="glitch"></div>
      <div class="hero-content">
        <div class="round-badge">Wingcraft Hackathon</div>
        <div class="tag">진행 중 / 예정</div>
        <h1 class="title">
          Hackathon
          <span>2026</span>
        </h1>
        <p class="subtitle">나만의 아이디어를 현실로 만드는 시간</p>
        
        <div class="divider"></div>
        
        <schedule>
          <div class="schedule-item">
            <span class="round-num">2</span>
            <div class="round-info">
              <span class="round-date">2차 - 5월 15일</span>
              <span class="round-status">예정</span>
            </div>
          </div>
          <div class="schedule-item">
            <span class="round-num">1</span>
            <div class="round-info">
              <span class="round-date">1차 - 4월</span>
              <span class="round-status done">완료</span>
            </div>
          </div>
        </schedule>

        <div class="details">
          <div class="details-item">
            <span>주최</span>
            <span>Wingcraft</span>
          </div>
          <div class="details-item">
            <span>장소</span>
            <span>망포역 김성민카페</span>
          </div>
          <div class="details-item">
            <span>주제</span>
            <span>자유</span>
          </div>
        </div>
      </div>
    </div>

    <div class="history">
      <h2 class="history-title">지난 해커톤</h2>
      <div class="history-list">
        <a href="history/round1.html" class="history-card" target="_blank">
          <span class="card-num">1</span>
          <div class="card-info">
            <div class="card-round">1회차 • 2026</div>
            <div class="card-date">4월</div>
            <span class="card-status">완료</span>
          </div>
          <span class="card-arrow">→</span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
