    (function() {

  <style>
    :root {
      --abyss-black: #050507;
      --carbon-surface: #101010;
      --emerald-signal: #00d992;
      --volt-mint: #2fd6a1;
      --warm-charcoal: #3d3a39;

      --glow-shadow: 0 0 8px var(--emerald-signal);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--abyss-black);
      color: var(--snow-white);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* VoltAgent Typography */
    h1, h2, h3 {
      font-family: system-ui;

      letter-spacing: -0.65px;
      text-transform: uppercase;
    }

    .container {
      max-width: 1280px;

    /* Header */
    header {
      padding: 2rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--warm-charcoal);
      margin-bottom: 4rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--snow-white);
      text-decoration: none;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      background-color: var(--emerald-signal);
      clip-path: polygon(40% 0%, 40% 45%, 0% 45%, 60% 100%, 60% 55%, 100% 55%);
      filter: drop-shadow(0 0 2px var(--emerald-signal));
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 2px var(--emerald-signal)); }
      50% { filter: drop-shadow(0 0 8px var(--emerald-signal)); }
    }

    /* Rolling Hero Section */
    .hero-rolling-section {
      height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 6rem;
    }

    .picker-container {
      position: relative;
      height: 500px;
      width: 100%;
      max-width: 800px;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      perspective: 2000px;
      mask-image: linear-gradient(to bottom, transparent, black 25%, black 75%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 25%, black 75%, transparent);
    }

    .picker-container::-webkit-scrollbar { display: none; }

    .picker-list {
      padding: 200px 0;
      transform-style: preserve-3d;
    }

    .picker-item {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      scroll-snap-stop: always;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      cursor: pointer;
      will-change: transform, opacity;
    }

    .event-card {
      width: 90%;
      padding: 1.5rem 3rem;
      background: var(--carbon-surface);
      border: 1px solid var(--warm-charcoal);
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      text-decoration: none;
      color: inherit;
    }

    .picker-item.active .event-card {
      border-color: var(--emerald-signal);
      box-shadow: 0 0 30px rgba(0, 217, 146, 0.15);
      background: rgba(16, 16, 16, 0.8);
      transform: scale(1.15);
    }

    .picker-item:not(.active) { filter: blur(1px); }

    .event-info h2 {
      font-size: 2.5rem;
      margin-bottom: 0.25rem;
      transition: color 0.3s;
    }

    .picker-item.active .event-info h2 { color: var(--emerald-signal); }

    .event-info p {
      color: var(--steel-slate);
      font-family: 'SFMono-Regular', monospace;
      font-size: 0.875rem;
    }

    .status-badge {
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      border: 1px solid var(--warm-charcoal);

    .status-badge.live { color: var(--volt-mint); border-color: var(--emerald-signal); background: rgba(0, 217, 146, 0.05); }

    .selection-overlay {

      top: 50%;
      left: 50%;

      width: 100%;
      max-width: 820px;
      height: 110px;
      border-top: 1px solid rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.05);

      z-index: 10;
    }

    .widgets-grid {
      display: grid;
      grid-template-columns: 1fr;
      max-width: 800px;
      margin: 0 auto 6rem auto;

    }

    /* Invite Widget Styles */
    .invite-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }

    .invite-input, .invite-select {

      border: 1px solid var(--warm-charcoal);
      border-radius: 4px;
      padding: 0.75rem 1rem;
      color: var(--snow-white);
      font-family: 'SFMono-Regular', monospace;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.3s;
      width: 100%;
    }

    .invite-input:focus, .invite-select:focus {
      border-color: var(--emerald-signal);
    }

    .invite-button {
      background: var(--carbon-surface);
      border: 1px solid var(--warm-charcoal);
      border-radius: 4px;
      padding: 0.75rem 1.5rem;
      color: var(--volt-mint);
      font-family: 'SFMono-Regular', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }

    .invite-button:hover:not(:disabled) {
      background: rgba(0, 217, 146, 0.1);
      border-color: var(--emerald-signal);
    }

    .invite-button:disabled {
      color: var(--steel-slate);
      cursor: not-allowed;
      opacity: 0.5;
    }

    .accepted-badge {
      font-size: 0.65rem;
      padding: 2px 6px;
      background: rgba(0, 217, 146, 0.2);
      color: var(--emerald-signal);
      border-radius: 4px;
      border: 1px solid var(--emerald-signal);
    }

    .status-indicator {
      font-size: 0.65rem;
      font-family: 'SFMono-Regular', monospace;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .accepted-badge { background: rgba(0, 217, 146, 0.15); color: var(--emerald-signal); border: 1px solid var(--emerald-signal); }
    .sent-badge { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border: 1px solid #3b82f6; }
    .pending-badge { background: rgba(139, 148, 158, 0.15); color: var(--steel-slate); border: 1px solid var(--warm-charcoal); }

    .widget {
      background: var(--carbon-surface);
      border: 1px solid var(--warm-charcoal);
      border-radius: 8px;
      padding: 2rem;
    }

    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .widget-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--emerald-signal);
      letter-spacing: 2px;
    }

    .member-badge {
      font-size: 0.75rem;
      padding: 4px 8px;
      border: 1px solid var(--warm-charcoal);
      border-radius: 4px;
      margin-right: 0.5rem;
    }

    footer {
      padding: 4rem 0;
      text-align: center;
      border-top: 1px solid var(--warm-charcoal);
      color: var(--steel-slate);
      font-size: 0.75rem;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      header { margin-bottom: 2rem; padding: 1rem 0; }
      .event-info h2 { font-size: 1.5rem; }
      .event-card { padding: 1rem; }
      .hero-rolling-section { height: 60vh; margin-bottom: 3rem; }
      .picker-container { height: 400px; }
      .picker-item { height: 100px; }
      .picker-list { padding: 150px 0; }
      .selection-overlay { height: 90px; }
      .terminal-body { padding: 20px; font-size: 14px; }
      .widgets-grid { margin-bottom: 3rem; padding: 0 1rem; }
    }

    /* Terminal UI Styles */
    #terminalModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--abyss-black);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .terminal-window {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .terminal-header {
      background: #1a1a1a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      position: relative;
      border-bottom: 1px solid var(--warm-charcoal);
    }

    .terminal-buttons {
      display: flex;
      gap: 8px;
    }

    .terminal-button {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
    }

    .btn-close { background: #ff5f56; }
    .btn-minimize { background: #ffbd2e; }
    .btn-maximize { background: #27c93f; }

    .terminal-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: var(--steel-slate);
      font-family: 'SFMono-Regular', monospace;
    }

    .terminal-body {
      flex: 1;
      padding: 40px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 16px;
      line-height: 1.6;
      color: var(--snow-white);
      overflow-y: auto;
      background: #000;
    }

    .terminal-cursor {
      display: inline-block;
      width: 10px;
      height: 20px;
      background: var(--emerald-signal);
      margin-left: 5px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      from, to { opacity: 1; }
      50% { opacity: 0; }
    }

    .terminal-prompt { color: var(--emerald-signal); margin-right: 12px; }
    .command-text { color: var(--snow-white); }
    .output-line { color: var(--warm-parchment); margin-left: 24px; margin-bottom: 4px; }

    /* Terminal Invite UI */
    .terminal-invite-box {
      margin-top: 20px;
      padding: 20px;

    .terminal-invite-header {

      margin-bottom: 12px;
      font-family: 'SFMono-Regular', monospace;
    }

    .terminal-input-group {
      display: flex;
      gap: 10px;
    }

    .terminal-input {
      flex: 1;
      background: #000;
      border: 1px solid var(--warm-charcoal);
      color: var(--snow-white);
      padding: 8px 12px;
      font-family: 'SFMono-Regular', monospace;

    }

    .terminal-input:focus {
      border-color: var(--emerald-signal);
    }

    .terminal-btn {
      background: var(--carbon-surface);
      border: 1px solid var(--warm-charcoal);

      padding: 8px 16px;
      font-family: 'SFMono-Regular', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .terminal-btn:hover:not(:disabled) {
      background: rgba(0, 217, 146, 0.1);
      border-color: var(--emerald-signal);
    }

    .terminal-btn:disabled {
      color: var(--steel-slate);
      cursor: not-allowed;
      opacity: 0.5;
    }

    .calendar-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
  </style>

<body>
  <div class="container">
    <header id="mainHeader">
      <a href="index.html" class="logo">
        <div class="logo-icon"></div>
        <span>WINGCRAFT HACK-HUB</span>
      </a>
      <!-- Status will be injected here -->
    </header>

    <section class="hero-rolling-section">
      <div class="selection-overlay"></div>
      <div class="picker-container" id="eventPicker">
        <div class="picker-list" id="eventList">
          <!-- Events will be injected here -->
        </div>
      </div>
    </section>

    <div class="widgets-grid" id="widgetsGrid">
      <!-- Widgets will be injected here -->
    </div>

    <footer>
      &copy; 2026 WINGCRAFT. EXECUTED BY 2-MAN SQUAD.
    </footer>
  </div>

  <!-- Terminal Modal -->
  <div id="terminalModal">
    <div class="terminal-window">
      <div class="terminal-header">
        <div class="terminal-buttons">
          <div class="terminal-button btn-close" onclick="closeTerminal()"></div>
          <div class="terminal-button btn-minimize" onclick="closeTerminal()"></div>
          <div class="terminal-button btn-maximize"></div>
        </div>
        <div class="terminal-title">wingcraft — bash — 120x40</div>
      </div>
      <div class="terminal-body" id="terminalContent">
        <!-- Typed content will be injected here -->
      </div>
    </div>
  </div>

  <script>
    let projectData = null;

    async function loadData() {
      try {
        const response = await fetch('data.json');
        projectData = await response.json();
        renderPage(projectData);
      } catch (error) {
        console.error('Error loading data:', error);
      }
    }

    function renderPage(data) {
      // 1. Header Status
      document.getElementById('mainHeader').insertAdjacentHTML('beforeend', `
        <div style="font-size: 0.75rem; color: var(--steel-slate); font-family: monospace; text-align: right;">
          [ STATUS: ${data.projectInfo.status} ]<br>
          [ LAST PUSH: ${data.projectInfo.lastPush} ]
        </div>
      `);

      // 2. Rolling Events
      const eventList = document.getElementById('eventList');
      data.events.forEach(event => {
        const item = document.createElement('div');
        item.className = 'picker-item';
        item.setAttribute('data-id', event.id);
        
        const content = `
          <div class="event-card" onclick="handleCardClick(${event.id}, event)">
            <div class="event-info">
              <h2>${event.round}</h2>
              <p>${event.date} / ${event.status}</p>
            </div>
            <span class="status-badge ${event.badgeClass}">${event.statusBadge}</span>
          </div>
        `;
        item.innerHTML = content;
        eventList.appendChild(item);
      });

      // 3. Widgets (Project Info & Members)
      const widgetsGrid = document.getElementById('widgetsGrid');
      
      // Project Info Widget
      const projectWidget = `
        <div class="widget">
          <div class="widget-header">
            <div class="widget-label">HACKATHON MISSION</div>
            <div class="status-badge live" style="font-size: 10px;">${data.projectInfo.phase}</div>
          </div>
          <p style="color: var(--warm-parchment); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.6;">
            ${data.projectInfo.description}
          </p>
        </div>
      `;
      
      // Members Widget
      const activeEvent = data.events.find(e => e.status === 'LIVE' || e.status === 'ACTIVE') || data.events[data.events.length - 1];
      const membersHtml = data.members.map(m => {
        const inviteStatus = activeEvent.invitations ? activeEvent.invitations[m.email] : 'PENDING';
        const statusClass = inviteStatus === 'ACCEPTED' ? 'accepted-badge' : (inviteStatus === 'SENT' ? 'sent-badge' : 'pending-badge');
        
        return `
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem;">
            <div style="display: flex; flex-direction: column; gap: 2px;">
              <span style="font-size: 0.9rem; font-weight: 500;">
                <span style="color: var(--emerald-signal)">@</span>${m.name}
              </span>
              <span style="color: var(--steel-slate); font-size: 11px; font-family: 'SFMono-Regular', monospace;">
                ${m.role} • ${m.email}
              </span>
            </div>
            <span class="status-indicator ${statusClass}">${inviteStatus}</span>
          </div>
        `;
      }).join('');
      
      const needsInvites = data.members.some(m => !activeEvent.invitations || activeEvent.invitations[m.email] === 'PENDING');
      
      const membersWidget = `
        <div class="widget">
          <div class="widget-header">
            <div class="widget-label">SQUAD MEMBERS</div>
            <div style="font-size: 10px; color: var(--steel-slate); font-family: monospace;">${activeEvent.round} STATUS</div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem;">
            ${membersHtml}
          </div>
          ${needsInvites ? `
            <button id="sendSquadInvitesBtn" onclick="sendSquadInvites()" class="invite-button">
              SEND SQUAD INVITES (EMAILJS)
            </button>
          ` : `
            <div style="text-align: center; color: var(--steel-slate); font-size: 0.75rem; font-family: 'SFMono-Regular', monospace; padding: 0.5rem; border: 1px dashed var(--warm-charcoal); border-radius: 4px;">
              ALL INVITES PROCESSED 🟢
            </div>
          `}
        </div>
      `;

      widgetsGrid.innerHTML = projectWidget + membersWidget;

      // Initialize Picker Logic
      initPicker();
      checkInvitation();
    }

    async function sendSquadInvites() {
      const btn = document.getElementById('sendSquadInvitesBtn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'PREPARING API...';

      if (
        !EMAILJS_CONFIG.publicKey ||
        !EMAILJS_CONFIG.serviceId ||
        !EMAILJS_CONFIG.templateId ||
        EMAILJS_CONFIG.publicKey.startsWith('YOUR_') ||
        EMAILJS_CONFIG.serviceId.startsWith('YOUR_') ||
        EMAILJS_CONFIG.templateId.startsWith('YOUR_')
      ) {
        console.error('EmailJS config is incomplete:', EMAILJS_CONFIG);
        alert('Email is not sent because EmailJS service/template IDs are still placeholders in index.html.');
        btn.textContent = 'CONFIG REQUIRED';
        btn.disabled = false;
        return;
      }

      const activeEvent = projectData.events.find(e => e.status === 'LIVE' || e.status === 'ACTIVE') || projectData.events[projectData.events.length - 1];
      const pendingMembers = projectData.members.filter(m => !activeEvent.invitations || activeEvent.invitations[m.email] === 'PENDING');

      if (pendingMembers.length === 0) {
        alert('All squad members have already been invited.');
        btn.textContent = originalText;
        btn.disabled = false;
        return;
      }

      try {
        for (const member of pendingMembers) {
          btn.textContent = `SENDING TO ${member.name}...`;

          await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
            to_name: member.name,
            to_email: member.email,
            round: activeEvent.round,
            message: `You are invited to join the ${activeEvent.round} session.`,
            link: `${window.location.origin}${window.location.pathname}?invite=accepted&eventId=${activeEvent.id}&email=${member.email}`
          });
          
          console.log(`Invite successfully sent to ${member.name} (${member.email})`);
        }

        alert('Squad invites have been successfully triggered via EmailJS API.');
        btn.textContent = 'INVITES SENT ✅';
        
        // 상태 업데이트 안내 (실제 서버가 없으므로 알림으로 대체)
        console.log('NOTE: Please update data.json manually to reflect the "SENT" status.');
      } catch (error) {
        console.error('EmailJS Error:', error);
        alert('Failed to send invites. Check the EmailJS public key, service ID, template ID, and template variables in index.html.');
        btn.textContent = 'RETRY SEND';
        btn.disabled = false;
      }
    }

    function checkInvitation() {
      const urlParams = new URLSearchParams(window.location.search);
      const inviteStatus = urlParams.get('invite');
      const eventId = parseInt(urlParams.get('eventId'));
      const email = urlParams.get('email');

      if (inviteStatus === 'accepted' && email) {
        if (eventId) {
          // Episode-specific acceptance
          let acceptedInvites = JSON.parse(localStorage.getItem('accepted_invites_ep') || '{}');
          if (!acceptedInvites[eventId]) {
            acceptedInvites[eventId] = email;
            localStorage.setItem('accepted_invites_ep', JSON.stringify(acceptedInvites));
          }
          openTerminal(eventId, true);
        } else {
          // Global acceptance
          let acceptedInvites = JSON.parse(localStorage.getItem('accepted_invites') || '[]');
          if (!acceptedInvites.includes(email)) {
            acceptedInvites.push(email);
            localStorage.setItem('accepted_invites', JSON.stringify(acceptedInvites));
          }
          loadData();
        }
        
        // Clear URL params without refreshing
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }

    function handleCardClick(eventId, event) {
      event.preventDefault();
      event.stopPropagation();
      
      const picker = document.getElementById('eventPicker');
      const items = document.querySelectorAll('.picker-item');
      const targetIndex = projectData.events.findIndex(e => e.id === eventId);
      
      const center = picker.scrollTop + picker.offsetHeight / 2;
      const targetItem = items[targetIndex];
      const itemCenter = targetItem.offsetTop + targetItem.offsetHeight / 2;
      
      const itemHeight = window.innerWidth < 768 ? 100 : 120;
      
      if (Math.abs(center - itemCenter) < itemHeight / 2) {
        openTerminal(eventId);
      } else {
        picker.scrollTo({ top: targetIndex * itemHeight, behavior: 'smooth' });
      }
    }

    function openTerminal(eventId, isAcceptance = false) {
      const eventData = projectData.events.find(e => e.id === eventId);
      if (!eventData) return;

      const modal = document.getElementById('terminalModal');
      const content = document.getElementById('terminalContent');
      content.innerHTML = '';
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';

      let lines = [
        { text: `user@wingcraft:~/hackathon$ cat EP_${eventId}_LOG.md`, delay: 40 },
        { text: eventData.details, delay: 0 }
      ];

      if (isAcceptance) {
        lines.push({ text: `\n[SUCCESS] INVITATION ACCEPTED FOR ${eventData.round}`, delay: 0 });
        lines.push({ text: `[SYSTEM] Generating calendar synchronization tokens...`, delay: 50 });
      } else if (eventData.link) {
        lines.push({ text: `\n[SYSTEM] External Archive detected.`, delay: 0 });
        lines.push({ text: `[SYSTEM] Opening ${eventData.link}...`, delay: 50 });
        setTimeout(() => {
          window.location.href = eventData.link;
        }, 2500);
      }

      typeTerminal(content, lines).then(() => {
        if (isAcceptance) {
          renderCalendarActions(content, eventData);
        }
      });
    }

    function closeTerminal() {
      document.getElementById('terminalModal').style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    async function typeTerminal(container, lines) {
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const lineElement = document.createElement('div');
        lineElement.style.marginBottom = '10px';
        
        if (line.text.startsWith('user@wingcraft')) {
          lineElement.innerHTML = '<span class="terminal-prompt">user@wingcraft:~/hackathon$</span><span class="command-text"></span><span class="terminal-cursor"></span>';
          container.appendChild(lineElement);
          const commandSpan = lineElement.querySelector('.command-text');
          const cursor = lineElement.querySelector('.terminal-cursor');
          
          const commandText = line.text.split('$ ')[1];
          for (let char of commandText) {
            commandSpan.textContent += char;
            await new Promise(r => setTimeout(r, line.delay));
          }
          cursor.remove();
        } else {
          await new Promise(r => setTimeout(r, 300));
          const outputLines = line.text.split('\n');
          for (let oLine of outputLines) {
            const oDiv = document.createElement('div');
            oDiv.className = 'output-line';
            oDiv.textContent = oLine.startsWith('>') ? oLine : `> ${oLine}`;
            container.appendChild(oDiv);
            await new Promise(r => setTimeout(r, 30));
          }
          
          if (i === lines.length - 1) {
            if (!line.text.includes('Opening')) {
              const finalPrompt = document.createElement('div');
              finalPrompt.innerHTML = '<span class="terminal-prompt">user@wingcraft:~/hackathon$</span><span class="terminal-cursor"></span>';
              container.appendChild(finalPrompt);
            }
          }
        }
        container.scrollTop = container.scrollHeight;
      }
    }

    function renderCalendarActions(container, eventData) {
      const actionBox = document.createElement('div');
      actionBox.className = 'terminal-invite-box';
      actionBox.innerHTML = `
        <div class="terminal-invite-header">[ACTION] SYNCHRONIZE WITH APPLE / GOOGLE CALENDAR</div>
        <div class="calendar-actions">
          <button onclick="downloadICS(${eventData.id})" class="terminal-btn">APPLE_CALENDAR</button>
          <button onclick="addToGoogleCalendar(${eventData.id})" class="terminal-btn">GOOGLE_CALENDAR</button>
        </div>
      `;
      container.appendChild(actionBox);
      container.scrollTop = container.scrollHeight;
    }

    function addToGoogleCalendar(eventId) {
      const event = projectData.events.find(e => e.id === eventId);
      const dateParts = event.date.split(' ')[0].split('.');
      const dateStr = dateParts[0] + dateParts[1] + dateParts[2];
      const start = `${dateStr}T113000Z`;
      const end = `${dateStr}T200000Z`;
      
      const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(event.round)}&dates=${start}/${end}&details=${encodeURIComponent(event.details)}&location=${encodeURIComponent('수원 망포역')}`;
      window.open(url, '_blank');
    }

    function downloadICS(eventId) {
      const event = projectData.events.find(e => e.id === eventId);
      const dateParts = event.date.split(' ')[0].split('.');
      const dateStr = `${dateParts[0]}${dateParts[1]}${dateParts[2]}`;
      
      const icsContent = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//Wingcraft//Hackathon//KO',
        'CALSCALE:GREGORIAN',
        'METHOD:PUBLISH',
        'BEGIN:VEVENT',
        `SUMMARY:${event.round}`,
        `UID:${Date.now()}@wingcraft.io`,
        `DTSTART;TZID=Asia/Seoul:${dateStr}T113000`,
        `DTEND;TZID=Asia/Seoul:${dateStr}T200000`,
        `DESCRIPTION:${event.details.replace(/\n/g, '\\n')}`,
        'LOCATION:수원 망포역 (Mangpo Station)',
        'STATUS:CONFIRMED',
        'SEQUENCE:0',
        'BEGIN:VALARM',
        'TRIGGER:-PT30M',
        'DESCRIPTION:Wingcraft Hackathon Reminder',
        'ACTION:DISPLAY',
        'END:VALARM',
        'END:VEVENT',
        'END:VCALENDAR'
      ].join('\r\n');

      const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
      const link = document.createElement('a');
      link.href = window.URL.createObjectURL(blob);
      link.setAttribute('download', `wingcraft_${event.id}.ics`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Close modal on click outside
    document.getElementById('terminalModal').addEventListener('click', (e) => {
      if (e.target.id === 'terminalModal') closeTerminal();
    });

    function initPicker() {
      const picker = document.getElementById('eventPicker');
      const items = document.querySelectorAll('.picker-item');
      const itemHeight = window.innerWidth < 768 ? 100 : 120;

      picker.scrollTop = 1 * itemHeight; // Default to RD.02

      const updatePicker = () => {
        const center = picker.scrollTop + picker.offsetHeight / 2;
        items.forEach(item => {
          const itemCenter = item.offsetTop + item.offsetHeight / 2;
          const distance = Math.abs(center - itemCenter);
          const normalizedDistance = Math.min(distance / 300, 1);
          
          const rotation = (itemCenter - center) / 2.5;
          const scale = 1 - (normalizedDistance * 0.4);
          const opacity = 1 - (normalizedDistance * 0.8);
          const zTranslate = -normalizedDistance * 200;
          
          item.style.transform = `rotateX(${rotation}deg) scale(${scale}) translateZ(${zTranslate}px)`;
          item.style.opacity = opacity;

          if (distance < itemHeight / 2) item.classList.add('active');
          else item.classList.remove('active');
        });
      };

      picker.addEventListener('scroll', updatePicker);
      window.addEventListener('load', updatePicker);
      
      items.forEach((item, index) => {
        item.addEventListener('click', () => {
          picker.scrollTo({ top: index * itemHeight, behavior: 'smooth' });
        });
      });
      
      // Initial trigger
      updatePicker();
    }

    loadData();
  </script>
</body>
</html>
