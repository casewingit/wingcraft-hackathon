<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WINGCRAFT HACK-HUB 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --abyss-black: #050507;
      --carbon-surface: #101010;
      --emerald-signal: #00d992;
      --volt-mint: #2fd6a1;
      --warm-charcoal: #3d3a39;
      --snow-white: #f2f2f2;
      --warm-parchment: #b8b3b0;
      --steel-slate: #8b949e;
      --glow-shadow: 0 0 8px var(--emerald-signal);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--abyss-black);
      color: var(--snow-white);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* VoltAgent Typography */
    h1, h2, h3 {
      font-family: system-ui;
      line-height: 1.0;
      letter-spacing: -0.65px;
      text-transform: uppercase;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Header */
    header {
      padding: 2rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--warm-charcoal);
      margin-bottom: 4rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--snow-white);
      text-decoration: none;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      background-color: var(--emerald-signal);
      clip-path: polygon(40% 0%, 40% 45%, 0% 45%, 60% 100%, 60% 55%, 100% 55%);
      filter: drop-shadow(0 0 2px var(--emerald-signal));
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 2px var(--emerald-signal)); }
      50% { filter: drop-shadow(0 0 8px var(--emerald-signal)); }
    }

    /* Rolling Hero Section */
    .hero-rolling-section {
      height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 6rem;
    }

    .picker-container {
      position: relative;
      height: 500px;
      width: 100%;
      max-width: 800px;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      perspective: 2000px;
      mask-image: linear-gradient(to bottom, transparent, black 25%, black 75%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 25%, black 75%, transparent);
    }

    .picker-container::-webkit-scrollbar { display: none; }

    .picker-list {
      padding: 200px 0;
      transform-style: preserve-3d;
    }

    .picker-item {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      scroll-snap-stop: always;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      cursor: pointer;
      will-change: transform, opacity;
    }

    .event-card {
      width: 90%;
      padding: 1.5rem 3rem;
      background: var(--carbon-surface);
      border: 1px solid var(--warm-charcoal);
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      text-decoration: none;
      color: inherit;
    }

    .picker-item.active .event-card {
      border-color: var(--emerald-signal);
      box-shadow: 0 0 30px rgba(0, 217, 146, 0.15);
      background: rgba(16, 16, 16, 0.8);
      transform: scale(1.15);
    }

    .picker-item:not(.active) { filter: blur(1px); }

    .event-info h2 {
      font-size: 2.5rem;
      margin-bottom: 0.25rem;
      transition: color 0.3s;
    }

    .picker-item.active .event-info h2 { color: var(--emerald-signal); }

    .event-info p {
      color: var(--steel-slate);
      font-family: 'SFMono-Regular', monospace;
      font-size: 0.875rem;
    }

    .status-badge {
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      border: 1px solid var(--warm-charcoal);
    }

    .status-badge.live { color: var(--volt-mint); border-color: var(--emerald-signal); background: rgba(0, 217, 146, 0.05); }
    .status-badge.completed { color: var(--steel-slate); }
    .status-badge.upcoming { color: var(--warm-parchment); }

    .selection-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      max-width: 820px;
      height: 110px;
      border-top: 1px solid rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      pointer-events: none;
      z-index: 10;
    }

    .widgets-grid {
      display: grid;
      grid-template-columns: 1fr;
      max-width: 800px;
      margin: 0 auto 6rem auto;
      gap: 2rem;
    }

    .widget {
      background: var(--carbon-surface);
      border: 1px solid var(--warm-charcoal);
      border-radius: 8px;
      padding: 2rem;
    }

    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .widget-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--emerald-signal);
      letter-spacing: 2px;
    }

    .member-badge {
      font-size: 0.75rem;
      padding: 4px 8px;
      border: 1px solid var(--warm-charcoal);
      border-radius: 4px;
      margin-right: 0.5rem;
    }

    footer {
      padding: 4rem 0;
      text-align: center;
      border-top: 1px solid var(--warm-charcoal);
      color: var(--steel-slate);
      font-size: 0.75rem;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      .event-info h2 { font-size: 1.5rem; }
      .event-card { padding: 1rem; }
    }

    /* Terminal UI Styles */
    #terminalModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .terminal-window {
      width: 90%;
      max-width: 700px;
      background: #1e1e1e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--warm-charcoal);
    }

    .terminal-header {
      background: #333;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      position: relative;
    }

    .terminal-buttons {
      display: flex;
      gap: 8px;
    }

    .terminal-button {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .btn-close { background: #ff5f56; }
    .btn-minimize { background: #ffbd2e; }
    .btn-maximize { background: #27c93f; }

    .terminal-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--steel-slate);
      font-family: monospace;
    }

    .terminal-body {
      padding: 20px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 14px;
      line-height: 1.6;
      color: var(--snow-white);
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
    }

    .terminal-cursor {
      display: inline-block;
      width: 8px;
      height: 15px;
      background: var(--emerald-signal);
      margin-left: 5px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      from, to { opacity: 1; }
      50% { opacity: 0; }
    }

    .terminal-prompt { color: var(--emerald-signal); margin-right: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <header id="mainHeader">
      <a href="index.html" class="logo">
        <div class="logo-icon"></div>
        <span>WINGCRAFT HACK-HUB</span>
      </a>
      <!-- Status will be injected here -->
    </header>

    <section class="hero-rolling-section">
      <div class="selection-overlay"></div>
      <div class="picker-container" id="eventPicker">
        <div class="picker-list" id="eventList">
          <!-- Events will be injected here -->
        </div>
      </div>
    </section>

    <div class="widgets-grid">
      <div class="widget" id="statusWidget">
        <!-- Status Widget content injected here -->
      </div>
    </div>

    <footer>
      &copy; 2026 WINGCRAFT. EXECUTED BY 2-MAN SQUAD.
    </footer>
  </div>

  <!-- Terminal Modal -->
  <div id="terminalModal">
    <div class="terminal-window">
      <div class="terminal-header">
        <div class="terminal-buttons">
          <div class="terminal-button btn-close" onclick="closeTerminal()"></div>
          <div class="terminal-button btn-minimize"></div>
          <div class="terminal-button btn-maximize"></div>
        </div>
        <div class="terminal-title">wingcraft — bash — 80x24</div>
      </div>
      <div class="terminal-body" id="terminalContent">
        <!-- Typed content will be injected here -->
      </div>
    </div>
  </div>

  <script>
    let projectData = null;

    async function loadData() {
      try {
        const response = await fetch('data.json');
        projectData = await response.json();
        renderPage(projectData);
      } catch (error) {
        console.error('Error loading data:', error);
      }
    }

    function renderPage(data) {
      // 1. Header Status
      document.getElementById('mainHeader').insertAdjacentHTML('beforeend', `
        <div style="font-size: 0.75rem; color: var(--steel-slate); font-family: monospace; text-align: right;">
          [ STATUS: ${data.projectInfo.status} ]<br>
          [ LAST PUSH: ${data.projectInfo.lastPush} ]
        </div>
      `);

      // 2. Rolling Events
      const eventList = document.getElementById('eventList');
      data.events.forEach(event => {
        const item = document.createElement('div');
        item.className = 'picker-item';
        item.setAttribute('data-id', event.id);
        
        const content = `
          <div class="event-card" onclick="openTerminal(${event.id}, event)">
            <div class="event-info">
              <h2>${event.round}</h2>
              <p>${event.date} / ${event.status}</p>
            </div>
            <span class="status-badge ${event.badgeClass}">${event.statusBadge}</span>
          </div>
        `;
        item.innerHTML = content;
        eventList.appendChild(item);
      });

      // 3. Status Widget
      const statusWidget = document.getElementById('statusWidget');
      statusWidget.innerHTML = `
        <div class="widget-header">
          <span class="widget-label">PROJECT STATUS</span>
          <span style="color: var(--volt-mint);">● LIVE</span>
        </div>
        <h3 style="margin-bottom: 1rem;">${data.projectInfo.phase}</h3>
        <p style="color: var(--warm-parchment); font-size: 0.9375rem; margin-bottom: 2rem;">
          ${data.projectInfo.description}
        </p>
        <div style="display: flex; gap: 0.5rem;">
          ${data.members.map(m => `<span class="member-badge">${m.name.toUpperCase()}</span>`).join('')}
        </div>
      `;

      // Initialize Picker Logic
      initPicker();
    }

    function openTerminal(eventId, event) {
      if (event) event.preventDefault();
      const eventData = projectData.events.find(e => e.id === eventId);
      if (!eventData) return;

      const modal = document.getElementById('terminalModal');
      const content = document.getElementById('terminalContent');
      content.innerHTML = '';
      modal.style.display = 'flex';

      const lines = [
        { text: `user@wingcraft:~/hackathon$ cat ${eventData.round.replace(/:/g, '').replace(/ /g, '_')}_LOG.md`, delay: 50 },
        { text: eventData.details, delay: 0 }
      ];

      typeTerminal(content, lines);
    }

    function closeTerminal() {
      document.getElementById('terminalModal').style.display = 'none';
    }

    async function typeTerminal(container, lines) {
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const lineElement = document.createElement('div');
        
        if (i === 0) {
          // Command line
          lineElement.innerHTML = '<span class="terminal-prompt">user@wingcraft:~/hackathon$</span><span class="command-text"></span><span class="terminal-cursor"></span>';
          container.appendChild(lineElement);
          const commandSpan = lineElement.querySelector('.command-text');
          const cursor = lineElement.querySelector('.terminal-cursor');
          
          const commandText = line.text.split('$ ')[1];
          for (let char of commandText) {
            commandSpan.textContent += char;
            await new Promise(r => setTimeout(r, line.delay));
          }
          cursor.remove();
        } else {
          // Output lines
          await new Promise(r => setTimeout(r, 200));
          const outputLines = line.text.split('\n');
          for (let oLine of outputLines) {
            const oDiv = document.createElement('div');
            oDiv.style.color = 'var(--warm-parchment)';
            oDiv.textContent = `> ${oLine}`;
            container.appendChild(oDiv);
            await new Promise(r => setTimeout(r, 50));
          }
          // Final prompt
          const finalPrompt = document.createElement('div');
          finalPrompt.innerHTML = '<span class="terminal-prompt">user@wingcraft:~/hackathon$</span><span class="terminal-cursor"></span>';
          container.appendChild(finalPrompt);
        }
      }
    }

    // Close modal on click outside
    document.getElementById('terminalModal').addEventListener('click', (e) => {
      if (e.target.id === 'terminalModal') closeTerminal();
    });

    function initPicker() {
      const picker = document.getElementById('eventPicker');
      const items = document.querySelectorAll('.picker-item');

      picker.scrollTop = 1 * 120; // Default to RD.02

      const updatePicker = () => {
        const center = picker.scrollTop + picker.offsetHeight / 2;
        items.forEach(item => {
          const itemCenter = item.offsetTop + item.offsetHeight / 2;
          const distance = Math.abs(center - itemCenter);
          const normalizedDistance = Math.min(distance / 300, 1);
          
          const rotation = (itemCenter - center) / 2.5;
          const scale = 1 - (normalizedDistance * 0.4);
          const opacity = 1 - (normalizedDistance * 0.8);
          const zTranslate = -normalizedDistance * 200;
          
          item.style.transform = `rotateX(${rotation}deg) scale(${scale}) translateZ(${zTranslate}px)`;
          item.style.opacity = opacity;

          if (distance < 60) item.classList.add('active');
          else item.classList.remove('active');
        });
      };

      picker.addEventListener('scroll', updatePicker);
      window.addEventListener('load', updatePicker);
      
      items.forEach((item, index) => {
        item.addEventListener('click', () => {
          picker.scrollTo({ top: index * 120, behavior: 'smooth' });
        });
      });
      
      // Initial trigger
      updatePicker();
    }

    loadData();
  </script>
</body>
</html>
