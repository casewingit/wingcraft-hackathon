<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wingcraft Hackathon 2026 - 1차 기록</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --abyss-black: #050507;
      --carbon-surface: #101010;
      --emerald-signal: #00d992;
      --warm-charcoal: #3d3a39;
      --snow-white: #f2f2f2;
      --warm-parchment: #b8b3b0;
      --steel-slate: #8b949e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--abyss-black);
      color: var(--snow-white);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .archive-poster {
      width: 100%;
      max-width: 600px;
      background-color: var(--carbon-surface);
      border: 1px solid var(--warm-charcoal);
      border-radius: 8px;
      padding: 3rem;
      position: relative;
    }

    .archive-poster::after {
      content: 'ARCHIVED';
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 12px;
      font-weight: 700;
      color: var(--steel-slate);
      letter-spacing: 2px;
      border: 1px solid var(--warm-charcoal);
      padding: 4px 8px;
      border-radius: 4px;
    }

    .badge {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--emerald-signal);
      margin-bottom: 1rem;
      display: block;
    }

    h1 {
      font-family: system-ui;
      font-size: 48px;
      line-height: 1.0;
      letter-spacing: -0.65px;
      margin-bottom: 1rem;
    }

    .date {
      font-size: 18px;
      color: var(--warm-parchment);
      margin-bottom: 2rem;
    }

    .content-box {
      border-top: 1px solid var(--warm-charcoal);
      padding-top: 2rem;
      margin-top: 2rem;
    }

    .detail-item {
      margin-bottom: 1.5rem;
    }

    .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--steel-slate);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 0.25rem;
    }

    .value {
      font-size: 18px;
      color: var(--snow-white);
    }

    .back-link {
      display: inline-block;
      margin-top: 3rem;
      color: var(--emerald-signal);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="archive-poster">
    <span class="badge">Round 01</span>
    <h1>1차 해커톤</h1>
    <p class="date">2026.04.12</p>

    <div class="content-box">
      <div class="detail-item">
        <span class="label">Status</span>
        <span class="value" style="color: var(--emerald-signal);">COMPLETED</span>
      </div>
      <div class="detail-item">
        <span class="label">Location</span>
        <span class="value">Home / Remote</span>
      </div>
      <div class="detail-item">
        <span class="label">Notes</span>
        <span class="value">첫 번째 해커톤 세션. 개발 환경 셋업 및 프로토타입 구현 완료.</span>
      </div>
    </div>

    <a href="../poster.html" class="back-link">← Back to Main Terminal</a>
  </div>
</body>
</html>
