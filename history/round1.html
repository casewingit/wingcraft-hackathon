<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wingcraft 해커톤 2026 - 1차</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --accent: #ff3d00;
      --primary: #fafafa;
      --muted: #6b6b6b;
      --grid: rgba(255, 61, 0, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .poster {
      width: 100%;
      max-width: 600px;
      aspect-ratio: 3/4;
      background: var(--surface);
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 2.5rem;
      border: 1px solid rgba(255, 61, 0, 0.2);
      overflow: hidden;
    }

    .poster::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(var(--grid) 1px 1px,
        linear-gradient(90deg, var(--grid) 1px 1px);
      background-size: 40px 40px;
    }

    .poster::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03;
    }

    .content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; }

    .round-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.7rem; color: var(--primary); margin-bottom: 1rem;
    }

    .round-badge::before {
      content: ''; width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%;
    }

    .tag {
      font-size: 0.65rem; letter-spacing: 0.2em;
      color: var(--accent); margin-bottom: 0.5rem;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem; line-height: 0.9;
      letter-spacing: -0.02em; text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .title span { display: block; color: var(--accent); }

    .subtitle { font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

    .divider { width: 60px; height: 2px; background: var(--accent); margin-bottom: 1.5rem; }

    .schedule { display: flex; flex-direction: column; gap: 1.2rem; margin-bottom: 1.5rem; }

    .round { display: flex; align-items: flex-start; gap: 1rem; }

    .round-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem; color: var(--accent); min-width: 30px;
    }

    .round-info { font-size: 0.8rem; }

    .round-date { display: block; color: var(--primary); margin-bottom: 0.2rem; }

    .round-status {
      display: inline-block; font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      background: rgba(255, 61, 0, 0.15); color: var(--accent);
    }

    .round-status.done { background: rgba(255, 61, 0, 0.3); }

    .details { display: flex; flex-direction: column; gap: 0.6rem; font-size: 0.75rem; color: var(--muted); }

    .details-item { display: flex; gap: 0.8rem; }

    .divider2 { width: 100%; height: 1px; background: rgba(255,255,255,0.1); margin: 1.5rem 0; }

    .cta { margin-top: auto; display: flex; align-items: center; gap: 1rem; }

    .cta-text { font-size: 0.7rem; letter-spacing: 0.15em; color: var(--muted); }

    .cta-arrow {
      width: 40px; height: 40px;
      border: 1px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 1.2rem;
    }

    .glitch {
      position: absolute; top: 2rem; right: 2rem;
      width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%;
    }

    @media (max-width: 640px) {
      .poster { max-width: 100%; aspect-ratio: auto; min-height: 100vh; padding: 1.5rem; }
      .title { font-size: 3.5rem; }
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="glitch"></div>
    <div class="content">
      <div class="round-badge">Wingcraft Hackathon</div>
      <div class="tag">1회차 • 2026</div>
      <h1 class="title">Hackathon <span>2026</span></h1>
      <p class="subtitle">나만의 아이디어를 현실로 만드는 시간</p>
      
      <div class="divider"></div>
      
      <div class="schedule">
        <div class="round">
          <span class="round-num">1</span>
          <div class="round-info">
            <span class="round-date">1차 - 4월</span>
            <span class="round-status done">완료</span>
          </div>
        </div>
      </div>

      <div class="divider2"></div>
      
      <div class="details">
        <div class="details-item"><span>주최</span><span>Wingcraft</span></div>
        <div class="details-item"><span>장소</span><span>Home</span></div>
        <div class="details-item"><span>주제</span><span>자유</span></div>
      </div>
      
      <div class="cta">
        <span class="cta-text">함께 만들어요</span>
        <div class="cta-arrow">→</div>
      </div>
    </div>
  </div>
</body>
</html>
